
<style>
  .logo-scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    gap: 1.5rem;
  }
  .logo-svg-wrap {
    width: 260px;
    height: 260px;
  }
  .replay-btn {
    font-size: 13px;
    padding: 6px 20px;
    border-radius: 8px;
    border: 0.5px solid var(--color-border-secondary);
    background: transparent;
    color: var(--color-text-secondary);
    cursor: pointer;
    opacity: 0;
  }
  .replay-btn:hover { background: var(--color-background-secondary); }
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Animação das peças da logo girando até se montar.</h2>

<div class="logo-scene">
  <div class="logo-svg-wrap">
    <svg id="logoSvg" width="100%" height="100%" viewBox="0 0 545 545" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path id="p1" d="M19.5049 400.432L158.336 545H380.926L138.831 292.579L19.5049 400.432Z" fill="#327B32"/>
      <path id="p2" d="M252.421 138.832L0 380.926L2.29474 156.042L139.979 22.9474L252.421 138.832Z" fill="#0D2752"/>
      <path id="p3" d="M545 165.221L285.694 403.874L402.726 523.2L541.557 390.105L543.852 289.137L393.547 425.674L376.336 409.611L543.852 252.421L545 165.221Z" fill="#0D2752"/>
      <path id="p4" d="M270.779 384.369L157.19 273.074L270.779 158.337L384.369 273.074L270.779 384.369Z" fill="#0D2752"/>
      <path id="p5" d="M255.863 1.14737L164.074 0L406.168 255.863L522.053 139.979L388.958 3.44211L284.547 1.14737L442.884 167.516L424.526 183.579L255.863 1.14737Z" fill="#327B32"/>
    </svg>
  </div>
  <button class="replay-btn" id="replayBtn">↺ Repetir</button>
</div>

<script>
const cx = 272.5, cy = 272.5;

const pieces = [
  { id: 'p1', angle: -180, tx:  40, ty:  80, delay:   0 },
  { id: 'p2', angle:  135, tx: -80, ty: -40, delay: 150 },
  { id: 'p3', angle: -135, tx:  80, ty: -40, delay: 300 },
  { id: 'p4', angle:  270, tx:   0, ty:   0, delay: 450 },
  { id: 'p5', angle:  180, tx: -40, ty: -80, delay: 600 },
];

function runAnimation() {
  const btn = document.getElementById('replayBtn');
  btn.style.opacity = '0';

  pieces.forEach(({ id, angle, tx, ty, delay }) => {
    const el = document.getElementById(id);
    el.style.transition = 'none';
    el.style.opacity = '0';
    el.style.transformOrigin = `${cx}px ${cy}px`;
    el.style.transform = `translate(${tx}px, ${ty}px) rotate(${angle}deg)`;

    setTimeout(() => {
      el.style.transition = 'transform 0.7s cubic-bezier(0.34,1.3,0.64,1), opacity 0.4s ease';
      el.style.opacity = '1';
      el.style.transform = 'translate(0,0) rotate(0deg)';
    }, delay + 60);
  });

  // pulse final
  setTimeout(() => {
    const svg = document.getElementById('logoSvg');
    svg.style.transition = 'transform 0.35s ease';
    svg.style.transform = 'scale(1.05)';
    setTimeout(() => { svg.style.transform = 'scale(1)'; }, 350);
  }, 1500);

  setTimeout(() => {
    btn.style.transition = 'opacity 0.5s ease';
    btn.style.opacity = '1';
  }, 1900);
}

document.getElementById('replayBtn').addEventListener('click', () => {
  document.getElementById('replayBtn').style.opacity = '0';
  setTimeout(runAnimation, 100);
});

runAnimation();
</script>
